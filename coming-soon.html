<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Demnächst – Ruay Thai Noodle Dietikon</title>
  <meta name="description" content="Ruay Thai Noodle in Dietikon – authentisches Thai Streetfood. Wir öffnen bald." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon"             href="Bilder/Logo.avif" type="image/avif" />
  <link rel="apple-touch-icon" href="Bilder/Logo.avif" />
  <meta name="theme-color" content="#1E4A28" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=Noto+Sans+Thai:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #1E4A28;
      --chili:  #C24B33;
      --ocher:  #B5773D;
      --cream:  #FBF6EA;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100svh;
      background: linear-gradient(155deg, #F8EDD0 0%, #F2DFAF 55%, #EDD199 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: var(--green);
      padding: 40px 24px;
      text-align: center;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(30,74,40,.18);
      margin-bottom: 24px;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }

    .thai-label {
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: .85rem;
      color: var(--ocher);
      opacity: .8;
      letter-spacing: .04em;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      font-weight: 500;
      line-height: 1.15;
      color: var(--green);
      margin-bottom: 20px;
    }
    h1 em { font-style: italic; color: var(--chili); }

    .sub {
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(30,74,40,.7);
      margin-bottom: 40px;
      max-width: 360px;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--ocher);
      opacity: .5;
      border-radius: 2px;
      margin-bottom: 40px;
    }

    .contact-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--ocher);
      margin-bottom: 14px;
    }

    .contact-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 50px;
      font-size: .9rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
    }
    .contact-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(30,74,40,.15); }

    .btn-uber   { background: #000; color: #fff; }
    .btn-justeat { background: #FF8000; color: #fff; }
    .btn-wa     { background: #25D366; color: #fff; }
    .btn-phone  { background: var(--green); color: #fff; }

    .address {
      margin-top: 48px;
      font-size: .8rem;
      color: rgba(30,74,40,.5);
      line-height: 1.6;
    }

    @media (max-width: 400px) {
      .contact-links { flex-direction: column; align-items: stretch; }
      .contact-btn { justify-content: center; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="logo">
      <img src="Bilder/Logo.avif" alt="Ruay Thai Noodle Logo" width="80" height="80" />
    </div>

    <p class="thai-label">กำลังจะมา</p>

    <h1>Website<br />kommt <em>bald</em></h1>

      Die Website folgt in Kürze.

    <div class="divider"></div>

        Uber Eats
      </a>
      <a href="https://www.just-eat.ch/speisekarte/ruay-thai-nudeln" target="_blank" rel="noopener noreferrer" class="contact-btn btn-justeat">
        Just Eat

          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.44 2 2 0 0 1 3.62 1.26h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6 6l1.87-1.87a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 15.25z"/>

    </div>

    <p class="address">Heimstrasse 10 &middot; 8953 Dietikon</p>

  </div>
</body>
</html>
